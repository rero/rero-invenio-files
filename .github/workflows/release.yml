# Cuts a release with python-semantic-release. Run it from `staging` (our
# active branch): it reads the conventional commits since the last tag,
# computes the next version, updates the version, the lock file and the
# changelog, commits, tags and publishes a GitHub Release on `staging`, then
# fast-forwards `main` to that commit. Publishing the release triggers
# `pypi-publish.yml`.

name: Release

on:
  workflow_dispatch:
    inputs:
      prerelease:
        description: "Create a prerelease"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/staging'
    concurrency: release

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          # A PAT is required so the pushed tag/release triggers pypi-publish.yml
          # (events from the default GITHUB_TOKEN do not start other workflows).
          token: ${{ secrets.PAT_TOKEN }}

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Set up Python
        run: uv python install 3.14

      - name: Install dependencies
        run: uv sync --frozen

      - name: Python Semantic Release
        id: release
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if [ "${{ inputs.prerelease }}" = "true" ]; then
            uv run semantic-release version --prerelease
          else
            uv run semantic-release version
          fi

          # A release was made if HEAD now points exactly at a tag.
          if git describe --exact-match HEAD 2>/dev/null; then
            echo "released=true" >> "$GITHUB_OUTPUT"
          else
            echo "released=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Fast-forward main to the release commit
        if: steps.release.outputs.released == 'true'
        run: git push origin HEAD:main
